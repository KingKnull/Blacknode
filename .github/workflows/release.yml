name: Release

# Triggered by pushing a tag like `v0.2.0`. Builds Windows + macOS + Linux
# binaries in parallel and attaches them to the GitHub release for the tag.
#
# Windows binaries are optionally code-signed when the repo has the
# WINDOWS_SIGN_PFX_BASE64 + WINDOWS_SIGN_PASSWORD secrets set. Today this
# is wired for self-signed certs (see scripts/sign/README.md for setup);
# self-signing replaces "Unknown publisher" with your declared name but
# does NOT bypass Windows SmartScreen for end users — that needs an EV
# Authenticode cert or Microsoft Trusted Signing. macOS binaries are
# unsigned; adding Gatekeeper / notarytool support would need APPLE_ID /
# APPLE_PASSWORD / TEAM_ID + a Developer ID P12 base64 secret.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (must already exist)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: blacknode-linux-amd64
            ext: ""
          - os: windows-latest
            artifact: blacknode-windows-amd64.exe
            ext: ".exe"
          - os: macos-latest
            artifact: blacknode-darwin-arm64
            ext: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Generate Wails syso (Windows)
        if: matrix.os == 'windows-latest'
        run: wails3 generate syso -arch amd64 -icon build/appicon.png

      - name: Build binary
        run: go build -trimpath -ldflags="-s -w" -o ${{ matrix.artifact }} .

      - name: Sign Windows binary (self-signed)
        # Skipped silently when the secrets aren't set — fork PRs and
        # first-time setups will produce unsigned binaries instead of
        # failing the build.
        if: matrix.os == 'windows-latest' && secrets.WINDOWS_SIGN_PFX_BASE64 != ''
        env:
          WINDOWS_SIGN_PFX_BASE64: ${{ secrets.WINDOWS_SIGN_PFX_BASE64 }}
          WINDOWS_SIGN_PASSWORD: ${{ secrets.WINDOWS_SIGN_PASSWORD }}
        shell: pwsh
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "code-signing.pfx"
          [IO.File]::WriteAllBytes(
            $pfxPath,
            [Convert]::FromBase64String($env:WINDOWS_SIGN_PFX_BASE64)
          )
          $pw = ConvertTo-SecureString $env:WINDOWS_SIGN_PASSWORD -AsPlainText -Force
          pwsh -File scripts/sign/sign.ps1 `
            -Binary "${{ matrix.artifact }}" `
            -PfxPath $pfxPath `
            -Password $pw
          Remove-Item $pfxPath -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
