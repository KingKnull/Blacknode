name: "blacknode"
arch: ${GOARCH}
platform: "linux"
version: "${PKG_VERSION}"
section: "utils"
priority: "optional"
maintainer: "Blacknode <noreply@example.com>"
description: |
  Blacknode — remote infrastructure command platform.
  SSH multiplexer, observability, and AI-assisted ops in one app.
vendor: "Blacknode"
homepage: "https://github.com/blacknode/blacknode"
license: "MIT"
release: "1"

contents:
  - src: "./bin/blacknode"
    dst: "/usr/local/bin/blacknode"
    file_info:
      mode: 0755
  - src: "./build/appicon.png"
    dst: "/usr/share/icons/hicolor/128x128/apps/blacknode.png"
  # Generated by `wails3 task linux:generate:dotdesktop` as a build:native
  # dependency, so it's guaranteed to exist by the time nfpm packages run.
  - src: "./build/linux/blacknode.desktop"
    dst: "/usr/share/applications/blacknode.desktop"

# Default dependencies for Debian 12 / Ubuntu 22.04+ with WebKit 4.1.
# nfpm picks the right list per package format via the overrides below.
depends:
  - libgtk-3-0
  - libwebkit2gtk-4.1-0

overrides:
  rpm:
    depends:
      - gtk3
      - webkit2gtk4.1
  archlinux:
    depends:
      - gtk3
      - webkit2gtk-4.1

scripts:
  postinstall: "./build/linux/nfpm/scripts/postinstall.sh"
